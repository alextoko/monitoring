<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitoring Turbin</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">MONITORING TURBIN</div>

<div class="wrapper">

  <!-- ATAS -->
  <div class="section top">

    <div class="panel">
      <div class="title">TEMPERATURE</div>

      <div class="temp" id="temp">0.0°C</div>

      <div class="row">
        <div class="box yellow" id="clock">00:00:00</div>
        <div class="box">ALM ON</div>
        <div class="box" id="setDisplay">0.0°C</div>
        <div class="box yellow" onclick="setAlarm()">SET</div>
      </div>

      <div class="row">
        <div class="box green">PWM</div>
        <div class="box" id="pwm">0</div>
        <div class="box green">DUTY</div>
        <div class="box" id="duty">0%</div>
      </div>
    </div>

    <div class="panel">
      <div class="title">STATUS</div>

      <div class="row"><div class="box">MAX</div><div class="box" id="max">0</div></div>
      <div class="row"><div class="box">MIN</div><div class="box" id="min">0</div></div>
      <div class="row"><div class="box">AVG</div><div class="box" id="avg">0</div></div>
      <div class="row"><div class="box">ALARM</div><div class="box" id="alarm">OFF</div></div>
      <div class="row"><div class="box">IP</div><div class="box" id="ip">0.0.0.0</div></div>
    </div>

  </div>

  <!-- BAWAH -->
  <div class="section bottom">

    <div class="panel">
      <div class="title">LOG DATA SUHU</div>
      <div id="logTable"></div>
    </div>

    <div class="panel">
      <div class="title">GRAFIK 24 JAM</div>
      <canvas id="chart"></canvas>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
