<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Monitoring Turbin</title>

<style>
body{font-family:Segoe UI;background:#d9d9d9;margin:0}
.header{background:#00a8e8;padding:15px;text-align:center;font-weight:bold}
.container{display:flex;gap:10px;padding:10px}
.panel{background:#cfcfcf;border-radius:10px;padding:10px;flex:1}
.title{background:#ff9800;padding:10px;text-align:center;border-radius:8px;margin-bottom:10px}
.temp{font-size:90px;text-align:center;background:#eee;border-radius:10px;padding:20px}
.row{display:flex;gap:10px;margin-top:10px}
.box{flex:1;background:white;padding:10px;border-radius:8px;text-align:center;font-weight:bold}
.green{background:#4CAF50;color:white}
.red{background:#e74c3c;color:white}
.yellow{background:#f1c40f}
</style>

</head>
<body>

<div class="header">MONITORING TURBIN</div>

<div class="container">

<div class="panel">
<div class="title">TEMPERATURE</div>

<div class="temp" id="temp">0.0°C</div>

<div class="row">
<div class="box yellow" id="clock">00:00</div>
<div class="box">SET</div>
<div class="box" id="set">0</div>
</div>

<div class="row">
<div class="box green">PWM</div>
<div class="box" id="pwm">0</div>
<div class="box green">DUTY</div>
<div class="box" id="duty">0%</div>
</div>

</div>

<div class="panel">
<div class="title">STATUS</div>

<div class="row"><div class="box">MAX</div><div class="box" id="max">0</div></div>
<div class="row"><div class="box">MIN</div><div class="box" id="min">0</div></div>
<div class="row"><div class="box">AVG</div><div class="box" id="avg">0</div></div>

<div class="row"><div class="box">ALARM</div><div class="box" id="alarm">OFF</div></div>
<div class="row"><div class="box">IP</div><div class="box" id="ip">0.0.0.0</div></div>

</div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
